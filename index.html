<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturas de la Vida</title>

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: url('fondo.png') no-repeat center center/cover;
      color: white;
      text-align: center;
    }

    .overlay {
      min-height: 100vh;
      padding: 60px 20px;
    }

    .logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    h1 {
      font-size: 34px;
      margin: 10px 0;
      letter-spacing: 2px;
    }

    .bio {
      font-size: 16px;
      opacity: 0.9;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .social-icons {
      margin-bottom: 30px;
    }

    .social-icons a {
      margin: 0 15px;
      font-size: 26px;
      color: white;
      transition: 0.3s;
    }

    .social-icons a:hover {
      color: #7e7f7f;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 30px;
      background: #a4aeab;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }

  </style>
</head>

<body>

  <div class="overlay">

    <!-- LOGO -->
    <img class="logo" src="logo.png" alt="Logo">

    <!-- NOMBRE -->
    <h1>Facturas de la Vida</h1>

    <!-- DESCRIPCIÓN -->
    <p class="bio">
      Todos quieren resultados.<br>
      Nadie quiere pagar el precio.<br><br>
      Aquí están tus facturas.
    </p>

    <!-- REDES -->
    <div class="social-icons">
      <a href="https://www.instagram.com/facturasdelavida" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@facturasdelavida" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.facebook.com/facturasdelavida" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="https://www.youtube.com/@facturasdelavidaa" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>

    <!-- TEXTO EXTRA -->
    <p class="bio">
      ¿Vas a seguir ignorándolas?
    </p>

    <!-- BOTÓN -->
    <a href="https://www.instagram.com/facturasdelavida" class="btn" target="_blank">
      Pagar mis facturas
    </a>

  </div>

</body>
</html>
